server:
  port: ${SERVER_PORT:61}
  # servlet:
  #   context-path: /api/inventaris

spring:
  application:
    name: inventaris-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dbinventaris?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:90/eureka}
  instance:
    prefer-ip-address: true